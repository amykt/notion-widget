<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Today's Events</title>
<style>
  :root {
    --bg: #faf6f3;
    --card: #ffffff;
    --accent: #c1725d;
    --accent-soft: #e9c9bf;
    --text-main: #4a3f3a;
    --text-muted: #b3a89e;
    --line: #f0e4de;
    --font: 'Helvetica Neue', Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    font-family: var(--font);
    height: 100%;
    display: flex;
  }

  body {
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .widget {
    width: 100%;
    max-width: 420px;
    padding: 28px 30px;
  }

  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .header .date-label {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .header .day-number {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-muted);
  }

  .events {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .event {
    display: flex;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }

  .event:last-child {
    border-bottom: none;
  }

  .event-time {
    flex-shrink: 0;
    width: 66px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    line-height: 1.3;
    padding-top: 2px;
  }

  .event-bar {
    width: 3px;
    border-radius: 2px;
    background: var(--accent);
    flex-shrink: 0;
  }

  .event-bar.soft {
    background: var(--accent-soft);
  }

  .event-info {
    flex: 1;
  }

  .event-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-main);
    line-height: 1.3;
  }

  .event-sub {
    font-size: 12.5px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .empty-state {
    text-align: center;
    padding: 40px 0;
    color: var(--text-muted);
    font-size: 14px;
  }

  .empty-state .big {
    font-size: 28px;
    margin-bottom: 8px;
  }

  .status {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 18px;
  }
</style>
</head>
<body>

<div class="widget">
  <div class="header">
    <div class="date-label" id="dateLabel">Today</div>
    <div class="day-number" id="dayNumber"></div>
  </div>
  <div class="events" id="events">
    <div class="empty-state">Loading events…</div>
  </div>
  <div class="status" id="status"></div>
</div>

<script>
  // ---- CONFIGURE THIS ----
  // Paste the "Web app URL" you got from deploying the Apps Script (see calendar-apps-script.gs)
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz-Ca1Huep4im8w-UJT5Og-V4gHYFTGlCAyPd5LdDMBYFF5wOrkQeD4FMC6ygjjq-ftjg/exec';
  // -------------------------

  const eventsEl = document.getElementById('events');
  const statusEl = document.getElementById('status');

  // Colors cycle across whatever calendar labels show up, in order of first appearance
  const CALENDAR_COLORS = ['#c1725d', '#8fa3a0', '#c9a05a', '#9a86b0'];
  const labelColorMap = {};

  function colorForLabel(label) {
    if (!labelColorMap[label]) {
      const idx = Object.keys(labelColorMap).length % CALENDAR_COLORS.length;
      labelColorMap[label] = CALENDAR_COLORS[idx];
    }
    return labelColorMap[label];
  }

  function formatHeaderDate() {
    const now = new Date();
    const opts = { weekday: 'long', month: 'long', day: 'numeric' };
    document.getElementById('dateLabel').textContent = now.toLocaleDateString('en-US', { weekday: 'long' });
    document.getElementById('dayNumber').textContent = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
  }

  function formatTime(dateStr, isAllDay) {
    if (isAllDay) return 'All day';
    const d = new Date(dateStr);
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  function renderEvents(items) {
    eventsEl.innerHTML = '';

    if (!items || items.length === 0) {
      eventsEl.innerHTML = '<div class="empty-state"><div class="big">✦</div>Nothing on the calendar today</div>';
      return;
    }

    items.forEach((item, i) => {
      const isAllDay = !!item.isAllDay;
      const startStr = item.start;
      const endStr = item.end;
      const label = item.calendarLabel || '';
      const color = colorForLabel(label || 'default');

      const row = document.createElement('div');
      row.className = 'event';

      const bar = document.createElement('div');
      bar.className = 'event-bar';
      bar.style.background = color;

      const time = document.createElement('div');
      time.className = 'event-time';
      time.textContent = formatTime(startStr, isAllDay);

      const info = document.createElement('div');
      info.className = 'event-info';

      const titleRow = document.createElement('div');
      titleRow.style.display = 'flex';
      titleRow.style.alignItems = 'center';
      titleRow.style.gap = '8px';

      const title = document.createElement('div');
      title.className = 'event-title';
      title.textContent = item.summary || '(No title)';
      titleRow.appendChild(title);

      if (label) {
        const tag = document.createElement('span');
        tag.textContent = label;
        tag.style.fontSize = '10px';
        tag.style.fontWeight = '700';
        tag.style.letterSpacing = '0.5px';
        tag.style.textTransform = 'uppercase';
        tag.style.color = color;
        tag.style.background = color + '22';
        tag.style.padding = '2px 7px';
        tag.style.borderRadius = '20px';
        titleRow.appendChild(tag);
      }

      const sub = document.createElement('div');
      sub.className = 'event-sub';
      if (!isAllDay) {
        sub.textContent = formatTime(startStr, false) + ' – ' + formatTime(endStr, false);
      } else if (item.location) {
        sub.textContent = item.location;
      }

      info.appendChild(titleRow);
      if (sub.textContent) info.appendChild(sub);

      row.appendChild(time);
      row.appendChild(bar);
      row.appendChild(info);
      eventsEl.appendChild(row);
    });
  }

  async function loadEvents() {
    if (APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_WEB_APP_URL') {
      eventsEl.innerHTML = '<div class="empty-state">Add your Apps Script URL<br>in the script to connect</div>';
      return;
    }

    try {
      const res = await fetch(APPS_SCRIPT_URL);
      if (!res.ok) throw new Error('Request failed (' + res.status + ')');
      const data = await res.json();
      renderEvents(data.items);
      statusEl.textContent = '';
    } catch (err) {
      eventsEl.innerHTML = '<div class="empty-state">Couldn\'t load events.<br>Check the Apps Script deployment.</div>';
      statusEl.textContent = err.message;
    }
  }

  formatHeaderDate();
  loadEvents();
  setInterval(loadEvents, 5 * 60 * 1000); // refresh every 5 min
</script>

</body>
</html>
